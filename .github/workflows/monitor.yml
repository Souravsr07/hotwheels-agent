name: Hot Wheels Blinkit Monitor

on:
  schedule:
    # 06:00-02:00 Asia/Kolkata, hourly. GitHub cron is UTC.
    - cron: "30 0-20 * * *"
  workflow_dispatch:
    inputs:
      force_digest:
        description: "Send a digest on this manual run"
        required: false
        default: "false"

concurrency:
  group: hotwheels-monitor
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: hotwheels-state-${{ github.run_id }}
          restore-keys: |
            hotwheels-state-

      - name: Prepare config
        run: |
          cp config.example.json config.json
          test -f state.json || printf '{"alerts":{},"last_stock_digest_at":0}\n' > state.json

      - name: Run scheduled collector check
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.force_digest != 'true' }}
        run: python main.py --once --force-digest --ignore-active-hours

      - name: Run manual collector check with digest
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_digest == 'true' }}
        run: python main.py --once --force-digest --ignore-active-hours

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: hotwheels-state-${{ github.run_id }}
